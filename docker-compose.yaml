version: "3.8"

services:
  api:
    container_name: acm_digital_api
    build:
      context: .
      dockerfile: Dockerfile
    image: acm-digital/api:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - acm_digital_instances:/evolution/instances
    networks:
      - acm-digital-net
    env_file:
      - .env

  # frontend:
  #   container_name: acm_digital_frontend
  #   image: evoapicloud/evolution-manager:latest
  #   restart: always
  #   ports:
  #     - "3001:80"
  #   networks:
  #     - acm-digital-net

  redis:
    container_name: acm_digital_redis
    image: redis:7-alpine
    restart: always
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - acm_digital_redis:/data
    networks:
      - acm-digital-net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    container_name: acm_digital_postgres
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - acm_digital_postgres:/var/lib/postgresql/data
    networks:
      - acm-digital-net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  acm_digital_instances:
  acm_digital_redis:
  acm_digital_postgres:

networks:
  acm-digital-net:
    name: acm-digital-net
    driver: bridge
